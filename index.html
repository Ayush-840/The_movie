<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🎬 Movie Watchlist</h1>

    <!-- Search -->
    <input id="search" placeholder="Search movies..." />

    <div class="container">

        <!-- Movie Results -->
        <div id="movies"></div>

        <!-- Watchlist Sidebar -->
        <div id="watchlist">
            <h2>Saved Movies</h2>
            <div id="saved"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
