<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 MovieHub | Discover. Save. Watch.</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body data-theme="dark">

    <header>
        <a href="#" class="logo">🎬 MovieHub</a>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#" onclick="toggleWatchlist()">Watchlist</a>
            <a href="#" onclick="toggleSettingsLabels()">Settings</a>
        </nav>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
            <button class="menu-btn mobile-only"><i class="ph ph-list"></i></button>
        </div>
    </header>

    <section class="hero">
        <h1>Discover. Save. Watch.</h1>
        <div class="search-box">
            <i class="ph ph-magnifying-glass search-icon"></i>
            <input type="text" id="search-input" placeholder="Search for movies, series & actors...">
            <button class="btn-primary" onclick="window.handleSearch()">Search</button>
        </div>
        <div class="trending-tags">
            <span>Try searching for:</span>
            <button onclick="window.quickSearch('Avengers')">Avengers</button>
            <button onclick="window.quickSearch('Batman')">Batman</button>
            <button onclick="window.quickSearch('2025')">2025</button>
            <button onclick="window.quickSearch('Horror')">Horror</button>
        </div>
    </section>

    <nav class="filters-bar">
        <div class="genre-pills" id="genre-pills">
            <!-- Dynamic Genre Pills -->
        </div>
        <div class="sort-dropdown">
            <select id="sort-select" onchange="handleSort()">
                <option value="pop">Sort by: Rating</option>
                <option value="year">Sort by: Year</option>
                <option value="title">Sort by: Title</option>
            </select>
        </div>
    </nav>

    <main class="movies-grid" id="movie-grid">
        <!-- Movie Cards rendered here -->
    </main>

    <div class="load-more-container">
        <button id="load-more-btn" class="btn-secondary" onclick="loadMore()">Load More</button>
        <p class="page-info">Page <span id="page-num">1</span></p>
    </div>

    <aside class="watchlist-panel" id="watchlist-panel">
        <div class="panel-header">
            <h2>Your Watchlist</h2>
            <button class="close-btn" onclick="toggleWatchlist()"><i class="ph ph-x"></i></button>
        </div>
        <div class="watchlist-items" id="watchlist-items">
            <!-- Watchlist Items -->
        </div>
    </aside>

    <div class="modal-overlay" id="movie-modal">
        <!-- Movie Details Modal content -->
    </div>

    <div class="toast-container" id="toast-container"></div>

    <footer>
        <p>Built with ❤️ using OMDb, TMDB & Watchmode APIs</p>
    </footer>

    <!-- Dependency Order: Config -> API -> UI -> Watchlist -> App -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/watchlist.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
